---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all packages
  apt:
    upgrade: dist

- name: Install essential packages
  apt:
    name:
      - ufw
      - curl
      - wget
      - git
      - unzip
    state: present

- name: Allow SSH through firewall
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP through firewall
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS through firewall
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Allow all traffic within VPC
  ufw:
    rule: allow
    src: "10.0.0.0/16"

- name: Enable ufw
  ufw:
    state: enabled
    policy: deny

- name: Disable password authentication
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PasswordAuthentication"
    line: "PasswordAuthentication no"
    state: present
  notify: Restart SSH

- name: Disable root login
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "^PermitRootLogin"
    line: "PermitRootLogin no"
    state: present
  notify: Restart SSH

handlers:
  - name: Restart SSH
    service:
      name: ssh
      state: restarted